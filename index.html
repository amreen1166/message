<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Special Proposal ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffd6e7;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:35px;
color:#ff2e63;
margin-top:10px;
}

img{
width:220px;
margin-bottom:10px;
}

.buttons{
display:flex;
gap:20px;
margin-top:20px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff2e63;
color:white;
}

#no{
background:#333;
color:white;
}

/* floating hearts */

.heart{
position:fixed;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>

</head>

<body>

<img id="bear" src="images/proposal.gif">

<h1 id="question">Will you be my Baby, Darling and Lover? ❤️</h1>

<div class="buttons">
<button id="yes">Yes</button>
<button id="no">No</button>
</div>

<script>

const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");
const bear=document.getElementById("bear");
const question=document.getElementById("question");

let noCount=0;
let yesSize=20;
let desktopRunEnabled=false;

function runAway(){

const maxX=window.innerWidth-noBtn.offsetWidth;
const maxY=window.innerHeight-noBtn.offsetHeight;

const randomX=Math.random()*maxX;
const randomY=Math.random()*maxY;

noBtn.style.position="fixed";
noBtn.style.left=randomX+"px";
noBtn.style.top=randomY+"px";

}

/* Desktop mouse behavior */

noBtn.addEventListener("mouseover",()=>{

if(desktopRunEnabled){
runAway();
}

});

/* Click logic */

noBtn.addEventListener("click",()=>{

noCount++;

bear.src="images/sad.gif";

/* grow yes button */

yesSize+=8;
yesBtn.style.fontSize=yesSize+"px";

if(noCount==1){
question.innerText="No 😢";
}

else if(noCount==2){
question.innerText="Are you sure? 😭";
}

else if(noCount==3){
question.innerText="Please think again 🥺";
}

else if(noCount==4){
question.innerText="I will be VERY sad 💔";
}

else if(noCount>=5){

question.innerText="Okay fine 😭 try to catch the No button!";

/* enable desktop run */

desktopRunEnabled=true;

/* phone behaviour */

runAway();

}

});

/* mobile support */

noBtn.addEventListener("touchstart",function(e){

if(noCount>=5){
e.preventDefault();
runAway();
}

});

/* YES button */

yesBtn.addEventListener("click",()=>{

bear.src="images/happy.gif";

question.innerText="Yay ❤️ I knew you would say YES!!!";

document.querySelector(".buttons").style.display="none";

confetti();

});
  
/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

setInterval(createHeart,300);

/* confetti */

function confetti(){

for(let i=0;i<120;i++){
createHeart();
}

}

</script>

</body>
</html>
