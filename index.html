<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Special Proposal ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffd6e7;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:40px;
color:#ff2e63;
}

img{
width:220px;
margin-bottom:20px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
}

#yes{
background:#ff2e63;
color:white;
}

#no{
background:#333;
color:white;
position:absolute;
}

.heart{
position:absolute;
color:red;
font-size:20px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>

</head>

<body>

<img id="bear" src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

<h1 id="question">Will you be my Valentine? ❤️</h1>

<button id="yes">Yes</button>
<button id="no">No</button>

<script>

const noBtn=document.getElementById("no");
const yesBtn=document.getElementById("yes");
const bear=document.getElementById("bear");
const question=document.getElementById("question");

noBtn.addEventListener("mouseover",()=>{

const x=Math.random()*window.innerWidth;
const y=Math.random()*window.innerHeight;

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

yesBtn.addEventListener("click",()=>{

bear.src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif";

question.innerText="YAYYY ❤️ I knew you would say YES!!!";

yesBtn.style.display="none";
noBtn.style.display="none";

confetti();

});

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

setInterval(createHeart,300);

function confetti(){

for(let i=0;i<100;i++){

createHeart();

}

}

</script>

</body>

</html>
