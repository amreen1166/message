<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Proposal ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ffd6e7;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
font-size:38px;
color:#ff2e63;
}

img{
width:220px;
margin-bottom:20px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yes{
background:#ff2e63;
color:white;
}

#no{
background:#333;
color:white;
}

</style>

</head>

<body>

<img id="bear" src="images/proposal.gif">

<h1 id="question">Will you be my Baby, Darling and Lover? ❤️</h1>

<button id="yes">Yes</button>
<button id="no">No</button>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const bear = document.getElementById("bear");
const question = document.getElementById("question");

function moveButton(){

const x = Math.random() * (window.innerWidth - 100);
const y = Math.random() * (window.innerHeight - 50);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

}

noBtn.addEventListener("mouseover", moveButton);   // for laptop
noBtn.addEventListener("touchstart", moveButton);  // for phone

yesBtn.addEventListener("click", () => {

bear.src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif";

question.innerText="YAYYY ❤️ I knew you would say YES!!!";

yesBtn.style.display="none";
noBtn.style.display="none";

});

</script>
</body>
</html>
